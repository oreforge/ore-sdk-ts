name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run ci

      - name: Build
        run: bun run build

      - name: Verify ESM import
        run: node --input-type=module -e "import('./dist/index.js')"

      - name: Verify CJS require
        run: node -e "require('./dist/index.cjs')"

  publish-dev:
    name: Publish Dev to GitHub Packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Set dev version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          DEV_VERSION="${PKG_VERSION}-dev.$(git rev-parse --short HEAD)"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${DEV_VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing version: $DEV_VERSION"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        run: npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
